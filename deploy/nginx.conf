# LongiMed nginx config
# Replaced by setup_vps.sh with your real domain
# HTTP → HTTPS redirect handled by certbot

server {
    listen 80;
    server_name longimed.yourdomain.com;

    # Let certbot handle HTTPS upgrade
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name longimed.yourdomain.com;

    # SSL managed by certbot
    ssl_certificate     /etc/letsencrypt/live/longimed.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/longimed.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Mini App API + Payment webhooks (FastAPI on port 8000) ───
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /webhooks/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Raw body needed for webhook signature verification
        proxy_request_buffering off;
        proxy_read_timeout 30s;
    }

    location /docs {
        # Disable Swagger in production — only allow from VPS localhost
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:8000;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
}
