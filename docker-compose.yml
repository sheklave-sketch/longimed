version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medic
      POSTGRES_PASSWORD: password
      POSTGRES_DB: longimed
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No public port — only accessible inside Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medic -d longimed"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No public port — only accessible inside Docker network
    restart: unless-stopped

  bot:
    build: .
    command: python -m bot.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://medic:password@db:5432/longimed
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  webhooks:
    build: .
    command: uvicorn bot.webhook_server:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://medic:password@db:5432/longimed
      REDIS_URL: redis://redis:6379/0
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
